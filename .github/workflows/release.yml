name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Version label for a manual packaging run, or the release tag when publishing
        required: false
        default: manual
      publish_release:
        description: Publish a GitHub Release for the version input
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.package_suffix }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_suffix: linux-x86_64
          - os: macos-latest
            package_suffix: macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package
        shell: bash
        run: |
          version="${{ steps.meta.outputs.version }}"
          suffix="${{ matrix.package_suffix }}"
          package_name="sumteditor-${version}-${suffix}"

          mkdir -p "dist" "package/${package_name}"
          cp build/sumteditor "package/${package_name}/"
          cp LICENSE README.md README.zh-CN.md "package/${package_name}/"
          cp -R examples "package/${package_name}/examples"

          tar -czf "dist/${package_name}.tar.gz" -C package "${package_name}"
          shasum -a 256 "dist/${package_name}.tar.gz" > "dist/${package_name}.tar.gz.sha256"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: sumteditor-${{ steps.meta.outputs.version }}-${{ matrix.package_suffix }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.version }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          if ! printf '%s' "${release_tag}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release publishing requires a semantic version tag like v0.1.0, got: ${release_tag}" >&2
            exit 1
          fi

          if gh release view "${release_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${release_tag}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${release_tag}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "SumTEditor ${release_tag}" \
              --generate-notes
          fi
